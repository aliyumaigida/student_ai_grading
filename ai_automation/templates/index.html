<!DOCTYPE html>
<html>
<head>
  <title>AI Grader</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
  <div class="card shadow p-4">
    <h3 class="text-center mb-4">🎓 AI Exam Grader</h3>
    <div class="text-end mb-3">
      <a href="/logout/" class="btn btn-danger">Logout</a>
    </div>

    <!-- Form -->
    <form id="form" enctype="multipart/form-data">
      {% csrf_token %}

      <!-- Student Name -->
      <div class="mb-3">
          <label class="form-label">Student Name</label>
          <input type="text" name="student_name" class="form-control" required>
      </div>

      <!-- Marking File -->
      <div class="mb-3">
        <label class="form-label">Marking Scheme</label>
        <input type="file" name="marking_file" class="form-control" required>
      </div>

      <!-- Student File -->
      <div class="mb-3">
        <label class="form-label">Student File</label>
        <input type="file" name="student_file" class="form-control" required>
      </div>

      <button class="btn btn-primary w-100">Grade Exam</button>
    </form>

    <!-- Loader -->
    <div id="loading" class="text-center mt-3 d-none">
      <div class="spinner-border text-primary"></div>
      <p>Grading in progress...</p>
    </div>

    <!-- Result -->
    <div id="result" class="mt-4"></div>
  </div>
</div>

<script>
function getCSRFToken() {
    return document.querySelector('[name=csrfmiddlewaretoken]').value;
}

document.getElementById("form").addEventListener("submit", async function(e) {
    e.preventDefault();

    const loading = document.getElementById("loading");
    const resultDiv = document.getElementById("result");

    loading.classList.remove("d-none");
    resultDiv.innerHTML = "";

    let formData = new FormData(this);

    let res = await fetch("/grade/", {
        method: "POST",
        headers: {
            "X-CSRFToken": getCSRFToken()
        },
        body: formData
    });

    let data = await res.json();

    loading.classList.add("d-none");

    // Total score
    let html = `<div class="alert alert-success text-center">
                  <h4>Total Score: ${data.total_score} / ${data.total_max}</h4>
                </div>`;

    // Per question
    data.results.forEach(q => {
        let color = "secondary";
        if (q.score === q.max_marks) color = "success";
        else if (q.score > q.max_marks / 2) color = "warning";
        else color = "danger";

        html += `<div class="card mb-3 border-${color}">
                   <div class="card-body">
                     <h5>Question ${q.question_number}</h5>
                     <p><strong>Score:</strong> <span class="badge bg-${color}">${q.score} / ${q.max_marks}</span></p>
                     <p><strong>Feedback:</strong> ${q.feedback}</p>
                   </div>
                 </div>`;
    });

    resultDiv.innerHTML = html;
});
</script>

</body>
</html>
