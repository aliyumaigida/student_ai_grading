<!DOCTYPE html>
<html>
<head>
  <title>AI Grader</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

  <div class="card shadow p-4">
    <h3 class="text-center mb-4">🎓 AI Exam Grader</h3>

    <form id="form">
      <div class="mb-3">
        <label class="form-label">Marking Scheme</label>
        <input type="file" name="marking_file" class="form-control" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Student File</label>
        <input type="file" name="student_file" class="form-control" required>
      </div>

      <button class="btn btn-primary w-100">Grade Exam</button>
    </form>

    <!-- Loader -->
    <div id="loading" class="text-center mt-3 d-none">
      <div class="spinner-border text-primary"></div>
      <p>Grading in progress...</p>
    </div>

    <!-- Result -->
    <div id="result" class="mt-4"></div>
  </div>

</div>

<script>
document.getElementById("form").addEventListener("submit", async function(e) {
    e.preventDefault();

    const loading = document.getElementById("loading");
    const resultDiv = document.getElementById("result");

    loading.classList.remove("d-none");
    resultDiv.innerHTML = "";

    let formData = new FormData(this);

    let res = await fetch("/api/grade/", {
        method: "POST",
        body: formData
    });

    let data = await res.json();

    loading.classList.add("d-none");

    // 🔥 TOTAL SCORE CARD
    let html = `
      <div class="alert alert-success text-center">
        <h4>Total Score: ${data.total_score} / ${data.total_max}</h4>
      </div>
    `;

    // 🔥 QUESTION CARDS
    data.results.forEach(q => {

        let color = "secondary";

        if (q.score === q.max_marks) {
            color = "success";
        } else if (q.score > q.max_marks / 2) {
            color = "warning";
        } else {
            color = "danger";
        }

        html += `
        <div class="card mb-3 border-${color}">
          <div class="card-body">

            <h5 class="card-title">Question ${q.question_number}</h5>

            <p><strong>Question:</strong><br>${q.question}</p>

            <p><strong>Student Answer:</strong><br>${q.student_answer}</p>

            <p>
              <strong>Score:</strong>
              <span class="badge bg-${color}">
                ${q.score} / ${q.max_marks}
              </span>
            </p>

            <p><strong>Feedback:</strong><br>${q.feedback}</p>

          </div>
        </div>
        `;
    });

    resultDiv.innerHTML = html;
});
</script>

</body>
</html>
