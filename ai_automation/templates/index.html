<!DOCTYPE html>
<html>
<head>
  <title>AI Grader</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
  <div class="card shadow p-4">
    <h3 class="text-center mb-4">🎓 AI Exam Grader</h3>
    <div class="text-end mb-3">
      <a href="/logout/" class="btn btn-danger">Logout</a>
    </div>

    <!-- Form -->
    <form id="form" enctype="multipart/form-data">
      {% csrf_token %}

      <div class="mb-5">
        <a href="/history-page/" class="btn btn-primary">📜 View Student History</a>
      </div>
      <!-- Student Name -->
      <div class="mb-3">
          <label class="form-label">Student Name</label>
          <input type="text" name="student_name" class="form-control" required>
      </div>

      <!-- Matric Number -->
      <div class="mb-3">
          <label class="form-label">Matric Number</label>
          <input type="text" name="matric_no" class="form-control" required>
      </div>

      <!-- Marking File -->
      <div class="mb-3">
        <label class="form-label">Marking Scheme</label>
        <input type="file" name="marking_file" class="form-control" required>
      </div>

      <!-- Student File -->
      <div class="mb-3">
        <label class="form-label">Student File</label>
        <input type="file" name="student_file" class="form-control" required>
      </div>


      <button class="btn btn-primary w-100">Grade Exam</button>
    </form>

    <!-- Loader -->
    <div id="loading" class="text-center mt-3 d-none">
      <div class="spinner-border text-primary"></div>
      <p>Grading in progress...</p>
    </div>

    <!-- Result -->
    <div id="result" class="mt-4"></div>
  </div>
</div>

<script>
function getCSRFToken() {
    return document.querySelector('[name=csrfmiddlewaretoken]').value;
}

document.getElementById("form").addEventListener("submit", async function(e) {
    e.preventDefault();

    const loading = document.getElementById("loading");
    const resultDiv = document.getElementById("result");

    loading.classList.remove("d-none");
    resultDiv.innerHTML = "";

    let formData = new FormData(this);

    try {
        let res = await fetch("/grade/", {
            method: "POST",
            headers: { "X-CSRFToken": getCSRFToken() },
            body: formData
        });

        // Always parse as JSON safely
        let data;
        try {
            data = await res.json();
        } catch (jsonErr) {
            throw new Error(`Invalid JSON response`);
        }

        if (!res.ok) {
            throw new Error(data.error || `HTTP ${res.status}`);
        }

        // Hide loader
        loading.classList.add("d-none");

        // Total score
        let html = `<div class="alert alert-success text-center">
                      <h4>Total Score: ${data.total_score} / ${data.total_max}</h4>
                    </div>`;

        // Iterate over results
        if (data.results && Array.isArray(data.results)) {
            data.results.forEach(q => {
                // Fallback in case some keys are missing
                let score = q.score ?? 0;
                let max_marks = q.max_marks ?? 1;
                let question = q.question ?? "";
                let student_answer = q.student_answer ?? "";
                let feedback = q.feedback ?? "";
                let question_number = q.question_number ?? "";

                let color = "secondary";
                if (score === max_marks) color = "success";
                else if (score > max_marks / 2) color = "warning";
                else color = "danger";

                html += `<div class="card mb-3 shadow-sm border-${color}">
                          <div class="card-body">

                            <!-- ✅ SCORE FIRST -->
                            <h5 class="mb-3">
                              <span class="badge bg-${color} fs-6">
                                Score: ${score} / ${max_marks}
                              </span>
                            </h5>

                            <!-- ✅ QUESTION -->
                            <h6>
                              ${question}
                            </h6>

                            <!-- ✅ STUDENT ANSWER -->
                            <p class="mt-3">
                              <strong>Student Answer:</strong><br>
                              ${student_answer}
                            </p>

                            <!-- ✅ FEEDBACK -->
                            <p class="mt-3">
                              <strong>Feedback:</strong><br>
                              ${feedback}
                            </p>

                          </div>
                        </div>`;

            });
        }

        resultDiv.innerHTML = html;

    } catch (err) {
        loading.classList.add("d-none");
        resultDiv.innerHTML = `<div class="alert alert-danger">Error: ${err.message}</div>`;
        console.error("Grading error:", err);
    }
});
</script>



</body>
</html>
