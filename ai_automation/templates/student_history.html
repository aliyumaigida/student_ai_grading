<!DOCTYPE html>
<html>
<head>
    <title>Student History</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow p-5">
        <h3 class="text-center mb-4">📜 Student History</h3>
        <div class="text-end mb-3">
            <a href="/" class="btn btn-secondary">Back to Grading</a>
            <a href="/logout/" class="btn btn-danger">Logout</a>
        </div>

        <!-- Search by Matric Number -->
        <form id="history-form" class="mb-3">
            {% csrf_token %}
            <div class="mb-2">
                <label>Enter Matric Number (optional)</label>
                <input type="text" name="matric_no" class="form-control" placeholder="Leave empty for all students">
                <button class="btn btn-info w-100">Fetch History</button>
            </div>
        </form>

        <!-- Result -->
        <div id="history-result" class="mt-3"></div>
    </div>
</div>

<script>
document.getElementById("history-form").addEventListener("submit", async function(e){
    e.preventDefault();
    const resultDiv = document.getElementById("history-result");
    resultDiv.innerHTML = "Loading...";

    const matric_no = this.matric_no.value.trim();
    let url = "/student-history/";
    if(matric_no) url += `?matric_no=${encodeURIComponent(matric_no)}`;

    try {
        let res = await fetch(url, {
            headers: { "X-CSRFToken": document.querySelector('[name=csrfmiddlewaretoken]').value }
        });
        let data = await res.json();

        if(!res.ok) throw new Error(data.error || `HTTP ${res.status}`);

        // Display results
        let html = "<ul class='list-group'>";
        data.forEach(s => {
            html += `<li class='list-group-item'>
                        <strong>${s.student_name} (${s.matric_no})</strong>: ${s.total_score} / ${s.total_max} | Submitted: ${s.submitted_at}
                     </li>`;
        });
        html += "</ul>";

        resultDiv.innerHTML = html;

    } catch(err) {
        resultDiv.innerHTML = `<div class='alert alert-danger'>Error: ${err.message}</div>`;
    }
});
</script>

</body>
</html>
